<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Senhas</h1>
        
        <div class="result-container">
            <input type="text" id="password-display" readonly placeholder="Sua senha aparecerá aqui">
            <button id="copy-btn" title="Copiar senha">Copiar</button>
        </div>

        <div class="options">
            <div class="option">
                <label for="length">Comprimento: <span id="length-val">16</span> caracteres</label>
                <input type="range" id="length" min="8" max="32" value="16">
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" id="uppercase" checked> Incluir Letras Maiúsculas (A-Z)
                </label>
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" id="lowercase" checked> Incluir Letras Minúsculas (a-z)
                </label>
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" id="numbers" checked> Incluir Números (0-9)
                </label>
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" id="symbols" checked> Incluir Símbolos (!@#$%^&*)
                </label>
            </div>
        </div>

        <button id="generate-btn" class="btn-large">Gerar Senha Forte</button>
        
        <div id="strength-meter" class="strength-meter">
            <div id="strength-bar"></div>
            <span id="strength-text">Força: Forte</span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
